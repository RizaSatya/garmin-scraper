apiVersion: batch/v1
kind: CronJob
metadata:
  name: garmin-sync
spec:
  schedule: "59 23 * * *"
  timeZone: Asia/Jakarta
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: garmin-sync
              image: your-registry/garmin-sync:latest
              imagePullPolicy: IfNotPresent
              command: ["garmin-sync"]
              env:
                - name: TIMEZONE
                  value: Asia/Jakarta
                - name: SYNC_DAYS
                  value: "7"
                - name: GARMIN_ACCOUNT_KEY
                  value: personal
                - name: GARMIN_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: garmin-sync-secrets
                      key: GARMIN_EMAIL
                - name: GARMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: garmin-sync-secrets
                      key: GARMIN_PASSWORD
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: garmin-sync-secrets
                      key: DATABASE_URL
                - name: FERNET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: garmin-sync-secrets
                      key: FERNET_KEY
